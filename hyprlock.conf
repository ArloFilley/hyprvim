$font = JetBrainsMono Nerd Font
source = ~/.config/hypr/themes/rose-pine-moon.conf

general {
    hide_cursor = false
    ignore_empty_input = true
    screencopy_mode = 0
    fail_timeout = 1000
}

# uncomment to enable fingerprint authentication
# auth {
#     fingerprint {
#         enabled = true
#         ready_message = Scan fingerprint to unlock
#         present_message = Scanning...
#         retry_delay = 250 # in milliseconds
#     }
# }

animations {
    enabled = true
    bezier = linear, 1, 1, 0, 0
    animation = fadeIn, 1, 5, linear
    animation = fadeOut, 1, 5, linear
    animation = inputFieldDots, 1, 2, linear
}

background {
    monitor =
    xray = true
    path = screenshot
    blur_passes = 4
    blur_size = 4
}

input-field {
    monitor =
    size = 20%, 5%
    outline_thickness = 3
    inner_color = $base

    outer_color = $rose $pine $love $iris 45deg
    check_color = $iris $love $pine $rose 90deg
    fail_color = $love $rose $love 45deg

    font_color = $text
    fade_on_empty = false
    rounding = 20

    font_family = $font
    placeholder_text = Password...
    fail_text = $PAMFAIL

    # uncomment if you wish to display a message during authentication
    check_text = Authenticating...

    # uncomment to use a letter instead of a dot to indicate the typed password
    # dots_text_format = *
    # dots_size = 0.4
    dots_spacing = 0.4

    # uncomment to use an input indicator that does not show the password length (similar to swaylock's input indicator)
    # hide_input = true

    position = 0, -125
    halign = center
    valign = center
    shadow_passes = 2
}

# TIME
label {
    monitor =
    text = $TIME # ref. https://wiki.hyprland.org/Hypr-Ecosystem/hyprlock/#variable-substitution
    font_size = 90
    font_family = $font

    position = 0, 215
    halign = center
    valign = center
    outline_thickness = 1
}

# DATE
label {
    monitor =
    text = cmd[update:60000] date +"%A, %d %B %Y" # update every 60 seconds
    font_size = 25
    font_family = $font

    position = 5, 115
    halign = center
    valign = center
    outline_thickness = 1
}

# User Avatar
image {
    monitor = 
    path = $HOME/.face
    border_size = 0
    shadow_passes = 1
    halign = center
    valign = center
}
